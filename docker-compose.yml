version: '3.8'

services:
  # NestJS API
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: mekong-api
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - api/.env
    # Override only if you want to point away from Supabase
    environment:
      - NODE_ENV=production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Next.js Web App
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: mekong-web
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - web/.env.local
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api/v1
      - HOSTNAME=0.0.0.0
      - PORT=3001
    depends_on:
      - api
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis for Cache & Queue
  redis:
    image: redis:alpine
    container_name: mekong-redis
    restart: always
    ports:
      - "6379:6379"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: mekong-network
